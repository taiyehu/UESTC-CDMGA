name: pnpm-dual-deploy

on:
  workflow_call:
    inputs:
      channel:
        description: 'Branch or channel name to build/deploy'
        required: false
        type: string
        default: 'dev'
    secrets:
      SSH_HOST: {}
      SSH_SUDO: {}
      SSH_PRIVATE_KEY: {}
      SSH_PORT: {}

env:
  PROJECT_DIR: vueproject
  TARGET_DIR: /var/www/CDMGA-vue
  CHANNEL: dev

jobs:
  build-deploy:
    name: pnpm build
    runs-on: ubuntu-22.04

    env:
      CHANNEL: ${{ inputs.channel }}
    defaults:
      run:
        working-directory: ${{ env.PROJECT_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.channel }}

      - name: Show channel
        shell: bash
        run: |
          echo "Current Channel: ${{ inputs.channel }}"
          echo "Env Channel: $CHANNEL"

      - name: List json file  # 帮助确认JAR包的位置和名称
        run: ls -la pnpm-lock.yaml

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0     # 或写 '*' 用 pnpm 版本匹配 package.json

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: ${{ env.PROJECT_DIR }}/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: List build output  # 帮助确认构建产物的位置
        run: ls -la dist/  # 通常Vue项目构建输出到dist目录

      - name: Upload dist
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "${{ env.PROJECT_DIR }}/dist"
          target: /var/www/
          strip_components: 1


      - name: Deploy on server (atomic)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e

            BRANCH="${{ env.CHANNEL }}"
            DATE=$(date +%Y%m%d_%H%M%S)

            BASE_DIR="${{ env.TARGET_DIR }}"
            RELEASE_BASE="$BASE_DIR/release_${BRANCH}"
            RELEASE_DIR="$RELEASE_BASE/$DATE"
            sudo mkdir -p "$BASE_DIR"
            sudo mkdir -p "$RELEASE_BASE"
            sudo mkdir -p "$RELEASE_DIR"

            REMOTE_DIR="/var/www/dist"
            sudo ls -la "$REMOTE_DIR" || echo "上传文件尚不存在"

            sudo mv -f "$REMOTE_DIR" "$RELEASE_DIR"

            # No nested 'dist' handling and no backup of the symlink: symlink rotation
            # is intended for zero-downtime updates. Point current-<branch> directly
            # to the release directory contents.

            CURRENT_LINK="$BASE_DIR/current_${BRANCH}"
            sudo ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"

            # --- Cleanup old releases ---
            # Rules:
            # - dev: remove releases older than 5 days, but always keep the newest 6 releases
            # - stable/other: remove everything except the newest 6 releases
            MAX_KEEP=6
            if [ -d "$RELEASE_BASE" ]; then
              mapfile -t releases < <(ls -1d "$RELEASE_BASE"/* 2>/dev/null | grep -E '/[0-9]{8}_[0-9]{6}$' | sort -r)
              total=${#releases[@]}
              if [ "$total" -gt "$MAX_KEEP" ]; then
                age_threshold=$(( $(date +%s) - 5*24*3600 ))
                for idx in "${!releases[@]}"; do
                  if [ "$idx" -lt "$MAX_KEEP" ]; then
                    continue
                  fi
                  dir="${releases[$idx]}"
                  if [ "$BRANCH" = "dev" ]; then
                    # only delete if older than 5 days
                    if [ "$(stat -c %Y "$dir")" -lt "$age_threshold" ]; then
                      sudo rm -rf "$dir"
                    fi
                  else
                    # for stable and other branches delete beyond the newest MAX_KEEP
                    sudo rm -rf "$dir"
                  fi
                done
              fi
            fi

            sudo chown -R www-data:www-data "$BASE_DIR"
            sudo chmod -R 755 "$RELEASE_DIR"

            echo "✅ Deployed $BRANCH to $CURRENT_LINK"
            echo "部署完成时间: $(date)"