name: Environment update (commit-based incremental)

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      SSH_HOST: {}
      SSH_SUDO: {}
      SSH_PRIVATE_KEY: {}
      SSH_PORT: {}
      SSH_DOMIAN: {}

jobs:
  deploy-env:
    runs-on: ubuntu-22.04

    steps:
      # ----------------------------
      # Step 1: Checkout
      # ----------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # Step 2: 读取上次部署的 commit（唯一一次“读 SSH”）
      # ----------------------------
      - name: Read last deployed commit
        id: deployed
        run: |
          set +e
          LAST=$(ssh -p ${{ secrets.SSH_PORT || 22 }} \
            -o StrictHostKeyChecking=no \
            -i <(echo "${{ secrets.SSH_PRIVATE_KEY }}") \
            ${{ secrets.SSH_SUDO }}@${{ secrets.SSH_HOST }} \
            "cat /opt/webserver/DEPLOYED_COMMIT 2>/dev/null")

          if [ -z "$LAST" ]; then
            echo "last=NONE" >> $GITHUB_OUTPUT
            echo "No previous deployment found (first deploy)"
          else
            echo "last=$LAST" >> $GITHUB_OUTPUT
            echo "Last deployed commit: $LAST"
          fi

      # ----------------------------
      # Step 3: 基于“上次部署 → 当前 HEAD”做 diff
      # ----------------------------
      - name: Detect environment changes
        id: env_diff
        run: |
          systemd=false
          nginx=false
          skip_comp=false

          if [ "${{ steps.deployed.outputs.last }}" = "NONE" ]; then
            systemd=true
            nginx=true
            skip_comp=true
          else
            RANGE=${{ steps.deployed.outputs.last }}..HEAD
          fi

          if [ "$skip_comp" = "false" ]; then 
            echo "Diff range: $RANGE"

            if ! git diff --quiet $RANGE -- script/webserver.service; then
              systemd=true
            fi

            if ! git diff --quiet $RANGE -- script/cdmga_nginx.conf script/cdmga-assets.conf; then
              nginx=true
            fi
          fi

          echo "systemd_changed=$systemd" >> $GITHUB_OUTPUT
          echo "nginx_changed=$nginx" >> $GITHUB_OUTPUT

          if [ "$systemd" = "false" ] && [ "$nginx" = "false" ]; then
            echo "No environment changes detected"
          fi

      # ----------------------------
      # Step 4: 仅在有变化时上传文件（SCP）
      # ----------------------------
      - name: Upload env files
        if: steps.env_diff.outputs.systemd_changed == 'true' || steps.env_diff.outputs.nginx_changed == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: |
            script/webserver.service
            script/cdmga_nginx.conf
            script/cdmga-assets.conf
          target: /opt/webserver/script/


      # ----------------------------
      # Step 5: Systemd 部署
      # ----------------------------
      - name: Deploy Systemd
        if: steps.env_diff.outputs.systemd_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deploying systemd service..."
            sudo cp /opt/webserver/script/webserver.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable webserver.service
            sudo systemctl restart webserver.service
            echo "Systemd deployed"

      # ----------------------------
      # Step 6: Nginx 部署
      # ----------------------------
      - name: Deploy Nginx
        if: steps.env_diff.outputs.nginx_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deploying Nginx..."
            sudo mkdir -p /etc/nginx/snippets
            sudo cp /opt/webserver/script/cdmga-assets.conf /etc/nginx/snippets/cdmga-assets.conf
            sudo cp /opt/webserver/script/cdmga_nginx.conf /etc/nginx/sites-available/cdmga_nginx.conf
            sudo rm -f /etc/nginx/sites-enabled/default
            if [ ! -f /etc/nginx/sites-enabled/cdmga_nginx.conf ]; then
              sudo ln -s /etc/nginx/sites-available/cdmga_nginx.conf /etc/nginx/sites-enabled/
            fi
            sudo sed -i "s/server_name localhost;/server_name ${{ secrets.SSH_DOMIAN }};/" /etc/nginx/sites-available/cdmga_nginx.conf
            sudo sed -i "s/server_name dev.localhost;/server_name dev.${{ secrets.SSH_DOMIAN }};/" /etc/nginx/sites-available/cdmga_nginx.conf
            sudo nginx -t
            sudo systemctl restart nginx
            echo "Nginx deployed"

      - name: Update remote hashes
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "${GITHUB_SHA}" > /opt/webserver/DEPLOYED_COMMIT
            echo "Deployment marked at commit ${GITHUB_SHA}"

