name: Environment update

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      SSH_HOST: {}
      SSH_SUDO: {}
      SSH_PRIVATE_KEY: {}
      SSH_PORT: {}
      SSH_DOMIAN: {}

jobs:
  deploy-env:
    name: Environment deploy (增量)
    runs-on: ubuntu-22.04

    steps:
      # ----------------------------
      # Step 1: Checkout
      # ----------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # Step 2: 计算本地哈希
      # ----------------------------
      - name: Compute local hashes
        id: local_hash
        run: |
          mkdir -p ./hash
          sha256sum script/webserver.service | awk '{print $1}' > ./hash/webserver.service.local
          sha256sum script/cdmga_nginx.conf | awk '{print $1}' > ./hash/cdmga_nginx.conf.local
          sha256sum script/cdmga-assets.conf | awk '{print $1}' > ./hash/cdmga-assets.conf.local
          echo "Local hashes computed"

      # ----------------------------
      # Step 3: 下载远端 remote 哈希
      # ----------------------------
      - name: Download remote hashes
        id: download_remote
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "/opt/webserver/env_hash/*.hash"
          target: "./hash/"
          fail_on_error: true

      # ----------------------------
      # Step 4: 检测变化
      # ----------------------------
      - name: Detect changes
        id: env_diff
        run: |
          systemd_changed=false
          nginx_changed=false

          # systemd 文件
          LOCAL_HASH=$(cat ./hash/webserver.service.local)
          REMOTE_HASH_FILE=./hash/webserver.service.remote
          if [ ! -f "$REMOTE_HASH_FILE" ]; then
            echo "Remote hash for systemd not found, marking as changed"
            systemd_changed=true
          elif [ "$LOCAL_HASH" != "$(cat $REMOTE_HASH_FILE)" ]; then
            systemd_changed=true
            echo "Systemd file changed"
          else
            echo "Systemd unchanged"
          fi

          # nginx 文件
          for f in cdmga_nginx.conf cdmga-assets.conf; do
            LOCAL_HASH=$(cat ./hash/$f.local)
            REMOTE_HASH_FILE=./hash/$f.remote
            if [ ! -f "$REMOTE_HASH_FILE" ] || [ "$LOCAL_HASH" != "$(cat $REMOTE_HASH_FILE)" ]; then
              nginx_changed=true
              echo "Nginx file $f changed"
            else
              echo "Nginx file $f unchanged"
            fi
          done

          echo "systemd_changed=$systemd_changed" >> $GITHUB_OUTPUT
          echo "nginx_changed=$nginx_changed" >> $GITHUB_OUTPUT

          if [ "$systemd_changed" = "true" ] || [ "$nginx_changed" = "true" ]; then
            echo "any_changed=true" >> $GITHUB_OUTPUT
          else
            echo "any_changed=false" >> $GITHUB_OUTPUT
            echo "No environment changes detected"

      # ----------------------------
      # Step 5: Systemd 部署
      # ----------------------------
      - name: Deploy Systemd
        if: steps.env_diff.outputs.systemd_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deploying systemd service..."
            sudo cp /opt/webserver/script/webserver.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable webserver.service
            sudo systemctl restart webserver.service
            echo "Systemd deployed"

      # ----------------------------
      # Step 6: Nginx 部署
      # ----------------------------
      - name: Deploy Nginx
        if: steps.env_diff.outputs.nginx_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deploying Nginx..."
            sudo mkdir -p /etc/nginx/snippets
            sudo cp /opt/webserver/script/cdmga-assets.conf /etc/nginx/snippets/cdmga-assets.conf
            sudo cp /opt/webserver/script/cdmga_nginx.conf /etc/nginx/sites-available/cdmga_nginx.conf
            sudo rm -f /etc/nginx/sites-enabled/default
            if [ ! -f /etc/nginx/sites-enabled/cdmga_nginx.conf ]; then
              sudo ln -s /etc/nginx/sites-available/cdmga_nginx.conf /etc/nginx/sites-enabled/
            fi
            sudo sed -i "s/server_name localhost;/server_name ${{ secrets.SSH_DOMIAN }};/" /etc/nginx/sites-available/cdmga_nginx.conf
            sudo sed -i "s/server_name dev.localhost;/server_name dev.${{ secrets.SSH_DOMIAN }};/" /etc/nginx/sites-available/cdmga_nginx.conf
            sudo nginx -t
            sudo systemctl restart nginx
            echo "Nginx deployed"

      # ----------------------------
      # Step 7: 上传 local 哈希并覆盖 remote
      # ----------------------------
      - name: Upload hashes as remote
        if: steps.env_diff.outputs.any_changed == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "./hash/*.local"
          target: "/opt/webserver/env_hash/"
          strip_components: 0

      - name: Rename uploaded local hashes to remote on server
        if: steps.env_diff.outputs.any_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd /opt/webserver/env_hash
            for f in *.local; do
              # 计算目标文件名
              target_file="${f%.local}.remote"
              
              # 如果目标文件存在，则删除它
              if [ -e "$target_file" ]; then
                echo "Warning: Removing existing file $target_file"
                sudo rm "$target_file"
              fi
              
              # 将 .local 文件重命名为 .remote
              sudo mv "$f" "$target_file"
            done
