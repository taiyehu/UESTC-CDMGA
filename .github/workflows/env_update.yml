name: Environment update

on:
  workflow_dispatch: # 允许手动触发
  workflow_call:
    secrets:
      SSH_HOST: {}
      SSH_SUDO: {}
      SSH_PRIVATE_KEY: {}
      SSH_PORT: {}
      SSH_DOMIAN: {}

jobs:
  deploy-env:
    name: Environment deploy (差异驱动)
    runs-on: ubuntu-22.04

    steps:
      # ----------------------------
      # Step 1: Checkout 代码
      # ----------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取完整历史，以便 diff 检查

      # ----------------------------
      # Step 2: 检查文件是否存在（可选）
      # ----------------------------
      - name: Verify files exist
        run: |
          echo "Checking if required files exist..."
          ls -la script/ || echo "script/ directory not found"
          ls -la script/webserver.service || echo "webserver.service not found"
          ls -la script/cdmga_nginx.conf || echo "cdmga_nginx.conf not found"
          ls -la script/cdmga-assets.conf || echo "cdmga-assets.conf not found"

      # ----------------------------
      # Step 3: 检测环境文件是否变化
      # ----------------------------
      - name: Detect environment file changes
        id: env_diff
        run: |
          # 获取前一次提交与当前提交差异
          # 如果你在 workflow_dispatch 手动触发时，HEAD~1 可能不存在，可以改成 HEAD^ 或者用 git diff origin/dev...HEAD
          git fetch origin ${{ github.ref_name }}

          # 判断 webserver.service 是否变化
          if git diff --quiet HEAD~1 HEAD -- script/webserver.service; then
            echo "systemd_changed=false" >> $GITHUB_OUTPUT
          else
            echo "systemd_changed=true" >> $GITHUB_OUTPUT
          fi

          # 判断 nginx 配置是否变化
          if git diff --quiet HEAD~1 HEAD -- script/cdmga_nginx.conf script/cdmga-assets.conf; then
            echo "nginx_changed=false" >> $GITHUB_OUTPUT
          else
            echo "nginx_changed=true" >> $GITHUB_OUTPUT
          fi

          # 判断脚本文件是否变化（其他脚本）
          if git diff --quiet HEAD~1 HEAD -- script/*.sh script/*.py; then
            echo "script_changed=false" >> $GITHUB_OUTPUT
          else
            echo "script_changed=true" >> $GITHUB_OUTPUT
          fi

          # 输出整体变化标识
          if [ "${{ steps.env_diff.outputs.systemd_changed }}" = "true" ] || \
             [ "${{ steps.env_diff.outputs.nginx_changed }}" = "true" ] || \
             [ "${{ steps.env_diff.outputs.script_changed }}" = "true" ]; then
            echo "any_changed=true" >> $GITHUB_OUTPUT
          else
            echo "any_changed=false" >> $GITHUB_OUTPUT
            echo "No environment changes detected. Skipping deploy steps."
          fi

      # ----------------------------
      # Step 4: 仅在有变化时 SCP 脚本文件
      # ----------------------------
      - name: Transfer script files to server
        if: steps.env_diff.outputs.any_changed == 'true'
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "script/*"
          target: "/opt/webserver/"

      # ----------------------------
      # Step 5: Systemd 服务更新
      # ----------------------------
      - name: Check if Systemd update is needed
        run: |
          if [ "${{ steps.env_diff.outputs.systemd_changed }}" != "true" ]; then
            echo "Systemd service unchanged, skipping deployment."
          else
            echo "Systemd service changed, will deploy."
          fi

      - name: Deploy and enable Systemd service
        if: steps.env_diff.outputs.systemd_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "=== Systemd service changes detected, deploying... ==="
            sudo cp /opt/webserver/script/webserver.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable webserver.service
            sudo systemctl restart webserver.service
            echo "Systemd service updated successfully!"

      # ----------------------------
      # Step 6: Nginx 配置更新
      # ----------------------------
      - name: Check if Nginx update is needed
        run: |
          if [ "${{ steps.env_diff.outputs.nginx_changed }}" != "true" ]; then
            echo "Nginx config unchanged, skipping reload."
          else
            echo "Nginx config changed, will deploy."
          fi

      - name: Copy and enable Nginx configuration
        if: steps.env_diff.outputs.nginx_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "=== Nginx config changes detected, deploying... ==="
            sudo mkdir -p /etc/nginx/snippets
            sudo cp /opt/webserver/script/cdmga-assets.conf /etc/nginx/snippets/cdmga-assets.conf
            sudo cp /opt/webserver/script/cdmga_nginx.conf /etc/nginx/sites-available/

            sudo rm -f /etc/nginx/sites-enabled/default
            if [ ! -f /etc/nginx/sites-enabled/cdmga_nginx.conf ]; then
              sudo ln -s /etc/nginx/sites-available/cdmga_nginx.conf /etc/nginx/sites-enabled/
            fi

            sudo sed -i "s/server_name localhost;/server_name ${{ secrets.SSH_DOMIAN }};/" /etc/nginx/sites-available/cdmga_nginx.conf

            sudo nginx -t
            sudo systemctl restart nginx
            echo "Nginx configuration applied successfully!"

      # ----------------------------
      # Step 7: 验证环境（始终执行）
      # ----------------------------
      - name: Verify installation
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "=== Verification ==="
            echo "Nginx status:"
            systemctl status nginx --no-pager
            echo ""
            echo "Webserver service status:"
            systemctl status webserver.service --no-pager
            echo ""
            echo "Backend directories:"
            ls -la /opt/webserver
            ls -la /var/webserver
            echo ""
            echo "Frontend directories:"
            ls -la /var/webserver/ui
            echo ""
            echo "Systemd service file:"
            ls -la /etc/systemd/system/webserver.service
