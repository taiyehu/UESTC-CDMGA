name: Environment update

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      SSH_HOST: {}
      SSH_SUDO: {}
      SSH_PRIVATE_KEY: {}
      SSH_PORT: {}
      SSH_DOMIAN: {}

jobs:
  deploy-env:
    name: Environment deploy (增量)
    runs-on: ubuntu-22.04

    steps:
      # ----------------------------
      # Step 1: Checkout
      # ----------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ----------------------------
      # Step 2: 计算本地哈希（变量）
      # ----------------------------
      - name: Compute local hashes
        id: local_hash
        run: |
          SYSTEMD_HASH=$(sha256sum script/webserver.service | awk '{print $1}')
          NGINX_MAIN_HASH=$(sha256sum script/cdmga_nginx.conf | awk '{print $1}')
          NGINX_ASSET_HASH=$(sha256sum script/cdmga-assets.conf | awk '{print $1}')

          echo "systemd=$SYSTEMD_HASH" >> $GITHUB_OUTPUT
          echo "nginx_main=$NGINX_MAIN_HASH" >> $GITHUB_OUTPUT
          echo "nginx_asset=$NGINX_ASSET_HASH" >> $GITHUB_OUTPUT

      # ----------------------------
      # Step 3: 读取远端哈希（SSH）
      # ----------------------------
      - name: Read remote hashes
        id: remote_hash
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set +e
            echo "systemd=$(cat /opt/webserver/env_hash/webserver.service 2>/dev/null || echo MISSING)" >> $GITHUB_OUTPUT
            echo "nginx_main=$(cat /opt/webserver/env_hash/cdmga_nginx.conf 2>/dev/null || echo MISSING)" >> $GITHUB_OUTPUT
            echo "nginx_asset=$(cat /opt/webserver/env_hash/cdmga-assets.conf 2>/dev/null || echo MISSING)" >> $GITHUB_OUTPUT


      # ----------------------------
      # Step 4: 检测变化（变量 diff）
      # ----------------------------
      - name: Detect changes
        id: env_diff
        run: |
          systemd_changed=false
          nginx_changed=false

          if [ "${{ steps.local_hash.outputs.systemd }}" != "${{ steps.remote_hash.outputs.systemd }}" ]; then
            systemd_changed=true
            echo "Systemd changed"
          fi

          if [ "${{ steps.local_hash.outputs.nginx_main }}" != "${{ steps.remote_hash.outputs.nginx_main }}" ] || \
            [ "${{ steps.local_hash.outputs.nginx_asset }}" != "${{ steps.remote_hash.outputs.nginx_asset }}" ]; then
            nginx_changed=true
            echo "Nginx config changed"
          fi

          echo "systemd_changed=$systemd_changed" >> $GITHUB_OUTPUT
          echo "nginx_changed=$nginx_changed" >> $GITHUB_OUTPUT

          if [ "$systemd_changed" = "true" ] || [ "$nginx_changed" = "true" ]; then
            echo "any_changed=true" >> $GITHUB_OUTPUT
          else
            echo "any_changed=false" >> $GITHUB_OUTPUT
            echo "No environment changes detected"
          fi


      # ----------------------------
      # Step 5: Systemd 部署
      # ----------------------------
      - name: Deploy Systemd
        if: steps.env_diff.outputs.systemd_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deploying systemd service..."
            sudo cp /opt/webserver/script/webserver.service /etc/systemd/system/
            sudo systemctl daemon-reload
            sudo systemctl enable webserver.service
            sudo systemctl restart webserver.service
            echo "Systemd deployed"

      # ----------------------------
      # Step 6: Nginx 部署
      # ----------------------------
      - name: Deploy Nginx
        if: steps.env_diff.outputs.nginx_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            echo "Deploying Nginx..."
            sudo mkdir -p /etc/nginx/snippets
            sudo cp /opt/webserver/script/cdmga-assets.conf /etc/nginx/snippets/cdmga-assets.conf
            sudo cp /opt/webserver/script/cdmga_nginx.conf /etc/nginx/sites-available/cdmga_nginx.conf
            sudo rm -f /etc/nginx/sites-enabled/default
            if [ ! -f /etc/nginx/sites-enabled/cdmga_nginx.conf ]; then
              sudo ln -s /etc/nginx/sites-available/cdmga_nginx.conf /etc/nginx/sites-enabled/
            fi
            sudo sed -i "s/server_name localhost;/server_name ${{ secrets.SSH_DOMIAN }};/" /etc/nginx/sites-available/cdmga_nginx.conf
            sudo sed -i "s/server_name dev.localhost;/server_name dev.${{ secrets.SSH_DOMIAN }};/" /etc/nginx/sites-available/cdmga_nginx.conf
            sudo nginx -t
            sudo systemctl restart nginx
            echo "Nginx deployed"

      - name: Update remote hashes
        if: steps.env_diff.outputs.any_changed == 'true'
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_SUDO }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            mkdir -p /opt/webserver/env_hash
            echo "${{ steps.local_hash.outputs.systemd }}" > /opt/webserver/env_hash/webserver.service.hash
            echo "${{ steps.local_hash.outputs.nginx_main }}" > /opt/webserver/env_hash/cdmga_nginx.conf.hash
            echo "${{ steps.local_hash.outputs.nginx_asset }}" > /opt/webserver/env_hash/cdmga-assets.conf.hash

